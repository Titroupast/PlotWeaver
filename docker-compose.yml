version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: plotweaver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plotweaver
    ports:
      - "5432:5432"
    volumes:
      - plotweaver_pgdata:/var/lib/postgresql/data

volumes:
  plotweaver_pgdata: