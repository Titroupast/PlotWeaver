name: Deploy Web to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web-vercel.yml"
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    environment: prod
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "Missing secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "${VERCEL_ORG_ID}" ]; then
            echo "Missing secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "Missing secret: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Pull Vercel environment
        working-directory: apps/web
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel settings
        working-directory: apps/web
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        working-directory: apps/web
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
