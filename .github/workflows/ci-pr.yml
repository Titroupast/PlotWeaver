name: CI PR Gate

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/contracts/**"
      - ".github/workflows/**"
      - "SPEC.md"

jobs:
  contract-and-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dev dependencies
        run: pip install -e "apps/api[dev]"

      - name: Contract gate (priority)
        run: pytest -q packages/contracts/tests --cov=packages/contracts --cov-fail-under=90

      - name: API quick gate
        run: pytest -q apps/api/tests/test_api_smoke.py apps/api/tests/test_services_phase2.py apps/api/tests/test_orchestrator_service.py apps/api/tests/integration/test_api_run_integration.py --cov=plotweaver_api --cov-fail-under=80

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck web
        working-directory: apps/web
        run: npm run typecheck
