name: Deploy API Container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name (lowercase for GHCR)
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plotweaver-api" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Run migrations (placeholder command)
        run: |
          echo "Run alembic upgrade head on target environment before traffic switch."

      - name: Deploy container (placeholder command)
        run: |
          echo "Deploy $IMAGE_NAME:$IMAGE_TAG to your container platform (Render/Fly/Railway/K8s)."
          echo "Use provider CLI/API here with secrets from GitHub environment."
